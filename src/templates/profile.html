<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - GNUCannabis</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Perfil Auth0</h1>
      {% if user.picture %}
      <img src="{{ user.picture }}" alt="Foto de perfil" class="avatar">
      {% endif %}
      <p><strong>Nombre:</strong> {{ user.name or user.nickname or 'Sin nombre' }}</p>
      <p><strong>Email:</strong> {{ user.email or 'No disponible' }}</p>
      <p><strong>Sub:</strong> {{ user.sub or 'No disponible' }}</p>
      <div class="actions">
        <a class="btn" href="{{ url_for('web_auth.index') }}">Inicio</a>
        <a class="btn danger" href="{{ url_for('web_auth.logout') }}">Cerrar sesion</a>
      </div>
    </section>
  </main>
</body>
</html>
