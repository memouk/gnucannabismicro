<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNUCannabis - Auth0</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="brand">
        <div class="brand-logo">
          <svg width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="32" cy="32" r="31" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2" />
            <path
              d="M32 10c5 6 5 13 0 19-5-6-5-13 0-19Zm-12 9c7 2 11 8 11 15-7-2-11-8-11-15Zm24 0c0 7-4 13-11 15 0-7 4-13 11-15Zm-22 17c8 0 13 4 15 11-8 0-13-4-15-11Zm20 0c-2 7-7 11-15 11 2-7 7-11 15-11Z"
              fill="#2E7D32"
            />
            <text x="32" y="49" text-anchor="middle" font-size="16" font-weight="700" fill="#1B5E20">G</text>
          </svg>
        </div>
        <div>
          <h1>gnucannabis</h1>
          <p class="subtitle">Autenticacion oficial con Auth0</p>
        </div>
      </div>

      {% if user %}
      <p class="ok">Sesion iniciada</p>
      <p><strong>Usuario:</strong> {{ user.name or user.nickname or 'Sin nombre' }}</p>
      <p><strong>Email:</strong> {{ user.email or 'No disponible' }}</p>
      <div class="actions">
        <a class="btn" href="{{ url_for('web_auth.profile') }}">Ver perfil</a>
        <a class="btn danger" href="{{ url_for('web_auth.logout') }}">Cerrar sesion</a>
      </div>
      {% else %}
      <p>Inicia sesion para acceder a contenido protegido.</p>
      <div class="actions">
        <a class="btn primary" href="{{ url_for('web_auth.login') }}">Iniciar sesion</a>
      </div>
      {% endif %}
    </section>
  </main>
</body>
</html>
